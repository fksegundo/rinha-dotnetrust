#
# HAProxy config tuned for Rinha submission (LB budget: 0.20 CPU, 40MB).
# Frontend: TCP/9999.  Backends: Unix sockets exposed by api1/api2.
#

global
    nbthread        1
    maxconn         2048
    tune.bufsize    8192
    tune.maxrewrite 1024
    # No `log` directive on purpose: logging fully disabled to save CPU.

defaults
    mode            http
    timeout connect 2s
    timeout client  30s
    timeout server  30s
    timeout queue   2s
    timeout http-request 5s
    timeout http-keep-alive 30s
    option          dontlognull
    option          tcp-smart-accept
    option          tcp-smart-connect
    option          http-keep-alive
    no log

frontend fe_rinha
    bind            *:9999
    maxconn         2048
    default_backend be_rinha

backend be_rinha
    balance         roundrobin
    # No health checks: depends_on ordering + tight CPU budget.
    server api1 /sockets/api1.sock
    server api2 /sockets/api2.sock
